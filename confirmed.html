<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Zora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0F0F1A;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .app-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #0D9488;
      margin-bottom: 32px;
    }
    .tick {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 30px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 10px;
    }
    .sub {
      font-size: 18px;
      font-weight: 600;
      color: #0D9488;
      margin-bottom: 20px;
    }
    .body {
      font-size: 16px;
      color: #9CA3AF;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      background-color: #0D9488;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #4B5563;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-name">Zora</div>
    <span class="tick">✅</span>
    <h1>Email Confirmed!</h1>
    <p class="sub">Your account is ready</p>
    <p class="body">
      Return to the Zora app and log in to start your journey 🚀
    </p>
    <a class="btn" href="soberlife://auth/login">Open Zora App</a>
    <p class="hint">If the button doesn't work, open the Zora app manually and log in.</p>
  </div>
</body>
</html>
