<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset — Zora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0F0F1A;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .app-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #0D9488;
      margin-bottom: 32px;
    }
    .icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 30px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 16px;
    }
    .body {
      font-size: 16px;
      color: #9CA3AF;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      background-color: #0D9488;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #4B5563;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-name">Zora</div>
    <span class="icon">🔐</span>
    <h1>Password Reset</h1>
    <p class="body" id="body-text">
      Return to the Zora app to set your new password 🔐
    </p>
    <a class="btn" id="open-btn" href="soberlife://auth/callback?type=recovery">Open Zora App</a>
    <p class="hint" id="hint-text">If the button doesn't work, open the Zora app manually and try again.</p>
  </div>

  <script>
    // The Zora app's Supabase client uses flowType: 'pkce' (Chrome on Android
    // strips URL hash fragments before deep-link intents fire, which breaks the
    // implicit flow's #access_token). Under PKCE, Supabase appends the recovery
    // token as a query param instead: reset-password.html?code=XXX&type=recovery.
    // Still check the hash too, in case an older/implicit-flow link is ever sent.
    (function () {
      var hashParams = new URLSearchParams(window.location.hash.slice(1));
      var searchParams = new URLSearchParams(window.location.search);

      var code = searchParams.get('code');
      var accessToken = hashParams.get('access_token') || searchParams.get('access_token');
      var refreshToken = hashParams.get('refresh_token') || searchParams.get('refresh_token');
      var errorDescription = hashParams.get('error_description') || searchParams.get('error_description');

      var deepLink = null;
      if (code) {
        deepLink = 'soberlife://auth/callback?code=' + encodeURIComponent(code) + '&type=recovery';
      } else if (accessToken && refreshToken) {
        deepLink = 'soberlife://auth/callback#access_token=' + accessToken + '&refresh_token=' + refreshToken + '&type=recovery';
      }

      var btn = document.getElementById('open-btn');
      var bodyText = document.getElementById('body-text');
      var hintText = document.getElementById('hint-text');

      if (deepLink) {
        if (btn) btn.href = deepLink;
        setTimeout(function () {
          window.location.href = deepLink;
        }, 800);
      } else {
        // No usable code/tokens — don't silently send a dead recovery link
        // into the app. Show a clear error instead.
        if (bodyText) {
          bodyText.textContent = errorDescription
            ? 'This reset link is invalid or has expired (' + errorDescription.replace(/\+/g, ' ') + '). Please request a new one from the app.'
            : 'This reset link is invalid or has expired. Please request a new one from the app.';
        }
        if (hintText) hintText.textContent = 'Open the Zora app and tap "Forgot password?" to send a new link.';
        if (btn) btn.href = 'soberlife://auth/callback';
      }
    })();
  </script>
</body>
</html>
