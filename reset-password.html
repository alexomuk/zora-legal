<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset — Zora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0F0F1A;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .app-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #0D9488;
      margin-bottom: 32px;
    }
    .icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 30px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 16px;
    }
    .body {
      font-size: 16px;
      color: #9CA3AF;
      line-height: 1.6;
      margin-bottom: 36px;
    }
    .btn {
      display: inline-block;
      background-color: #0D9488;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #4B5563;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-name">Zora</div>
    <span class="icon">🔐</span>
    <h1>Password Reset</h1>
    <p class="body">
      Return to the Zora app to set your new password 🔐
    </p>
    <a class="btn" id="open-btn" href="soberlife://auth/callback?type=recovery">Open Zora App</a>
    <p class="hint">If the button doesn't work, open the Zora app manually and try again.</p>
  </div>

  <script>
    // Supabase appends tokens as a URL hash fragment after verifying the reset link:
    // reset-password.html#access_token=XXX&refresh_token=YYY&type=recovery
    // Extract them and forward into the app deep link so callback.tsx can set the session.
    (function () {
      var hash = window.location.hash.slice(1);
      var params = new URLSearchParams(hash);
      var accessToken = params.get('access_token');
      var refreshToken = params.get('refresh_token');

      var deepLink = accessToken && refreshToken
        ? 'soberlife://auth/callback#access_token=' + accessToken + '&refresh_token=' + refreshToken + '&type=recovery'
        : 'soberlife://auth/callback?type=recovery';

      // Update the button href with the correct tokens
      var btn = document.getElementById('open-btn');
      if (btn) btn.href = deepLink;

      // Attempt to auto-open the app after a short delay
      setTimeout(function () {
        window.location.href = deepLink;
      }, 800);
    })();
  </script>
</body>
</html>
