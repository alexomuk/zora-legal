<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get ZORA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #0F0F1A;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .app-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #0D9488;
      margin-bottom: 32px;
    }
    .icon {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 24px;
      display: block;
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #FFFFFF;
      margin-bottom: 10px;
    }
    .body {
      font-size: 16px;
      color: #9CA3AF;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: block;
      background-color: #0D9488;
      color: #FFFFFF;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 12px;
    }
    .btn:hover { opacity: 0.88; }
    .btn.secondary {
      background-color: transparent;
      border: 1px solid #2A2A3D;
      color: #FFFFFF;
    }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: #4B5563;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #2A2A3D;
      border-top-color: #0D9488;
      border-radius: 50%;
      margin: 0 auto 24px;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-name">Zora</div>

    <!-- Auto-redirect state (iOS / Android) -->
    <div id="redirecting" class="hidden">
      <span class="spinner"></span>
      <h1>Taking you to the store…</h1>
      <p class="body">If nothing happens, tap the button below.</p>
      <a id="auto-store-link" class="btn" href="#">Continue</a>
    </div>

    <!-- Chooser state (desktop / unrecognised device) -->
    <div id="chooser" class="hidden">
      <span class="icon">📲</span>
      <h1>Get ZORA</h1>
      <p class="body">Track your sobriety journey, build streaks, and connect with a supportive community.</p>
      <a class="btn" href="https://apps.apple.com/app/id6762664820">Download on the App Store</a>
      <a class="btn secondary" href="https://play.google.com/store/apps/details?id=app.zora.mobile">Get it on Google Play</a>
    </div>

    <p class="hint">ZORA — your sobriety companion</p>
  </div>

  <script>
    var APPLE_URL = 'https://apps.apple.com/app/id6762664820';
    var PLAY_URL = 'https://play.google.com/store/apps/details?id=app.zora.mobile';

    function detectPlatform() {
      var ua = navigator.userAgent || navigator.vendor || window.opera || '';
      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) return 'ios';
      if (/android/i.test(ua)) return 'android';
      return 'other';
    }

    var platform = detectPlatform();

    if (platform === 'ios' || platform === 'android') {
      var target = platform === 'ios' ? APPLE_URL : PLAY_URL;
      document.getElementById('redirecting').classList.remove('hidden');
      document.getElementById('auto-store-link').href = target;
      // Give the page a brief moment to paint before redirecting so the
      // "Continue" fallback link is already live if the auto-redirect is
      // blocked (some in-app browsers, e.g. Instagram/Facebook, do this).
      setTimeout(function () {
        window.location.href = target;
      }, 600);
    } else {
      document.getElementById('chooser').classList.remove('hidden');
    }
  </script>
</body>
</html>
